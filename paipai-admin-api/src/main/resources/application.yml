server:
  servlet:
    context-path: /api
    # 禁用 Cookies
    session:
      tracking-modes: []
      cookie:
        max-age: 0
  port: 9091
  http2:
    enabled: true

spring:
  threads:
    virtual:
      enabled: true
  application:
    name: paipai-admin-api
  profiles:
    active:
      - dev
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 3MB
  jackson:
    locale: zh_CN
    time-zone: GMT+8
    default-property-inclusion: non_null
  web:
    resources:
      add-mappings: false
  datasource:    
    type: com.zaxxer.hikari.HikariDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 200
      auto-commit: true
      idle-timeout: 30000
      pool-name: MySqlHikariPool
      max-lifetime: 1800000
      connection-timeout: 3000
      connection-test-query: SELECT 1
